<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Your Shopping Cart</title>
  <style>
    body {
      background: linear-gradient(135deg, #111, #1a1a1a);
      color: #fff;
      font-family: 'Inter', sans-serif;
    }

    .cart-container {
      background: rgba(255, 255, 255, 0.04);
      backdrop-filter: blur(10px);
      border-radius: 20px;
      padding: 40px;
      max-width: 900px;
      margin: 8rem auto 4rem;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.6);
      border: 1px solid rgba(255, 255, 255, 0.08);
      animation: slideIn 0.8s ease forwards;
      opacity: 0;
    }

    @keyframes slideIn {
      from {
        transform: translateY(60px);
        opacity: 0;
      }
      to {
        transform: translateY(0);
        opacity: 1;
      }
    }

    h1 {
      font-size: 2.5rem;
      color: #f8d800;
      text-align: center;
      margin-bottom: 30px;
    }

    .cart-item {
      display: flex;
      align-items: center;
      gap: 20px;
      background: rgba(255, 255, 255, 0.03);
      padding: 15px 20px;
      border-radius: 12px;
      margin-bottom: 20px;
      transition: transform 0.2s ease;
    }

    .cart-item:hover {
      transform: scale(1.01);
    }

    .cart-item img {
      width: 80px;
      height: 80px;
      object-fit: cover;
      border-radius: 12px;
      border: 1px solid #444;
    }

    .item-details {
      flex-grow: 1;
    }

    .item-details h3 {
      font-size: 1.1rem;
      margin-bottom: 6px;
      color: #eee;
    }

    .item-price {
      color: #42e695;
      font-size: 1rem;
    }

    .remove-button {
      background: #ff6ec4;
      border: none;
      padding: 8px 16px;
      border-radius: 6px;
      color: white;
      cursor: pointer;
      font-weight: 600;
      transition: background 0.3s;
    }

    .remove-button:hover {
      background: #e94c99;
    }

    .total-price {
      text-align: right;
      font-size: 1.5rem;
      color: #30cfd0;
      margin-top: 30px;
    }

    .checkout-button {
      display: block;
      margin-top: 20px;
      width: 100%;
      text-align: center;
      background: linear-gradient(to right, #42e695, #3bb2b8);
      color: #000;
      font-weight: bold;
      padding: 14px;
      border-radius: 8px;
      text-decoration: none;
      transition: 0.3s ease-in-out;
    }

    .checkout-button:hover {
      transform: scale(1.02);
      background: linear-gradient(to right, #3bb2b8, #42e695);
    }

    @media (max-width: 768px) {
      .cart-container {
        padding: 20px;
      }

      .cart-item {
        flex-direction: column;
        align-items: flex-start;
      }

      .cart-item img {
        width: 100%;
        height: auto;
      }

      .item-details {
        width: 100%;
      }

      .remove-button {
        align-self: flex-end;
      }
    }
  </style>
</head>
<body>

  <div class="cart-container">
    <h1>Your Shopping Cart</h1>

    <div class="cart-item">
      <img src="https://images.unsplash.com/photo-1596755094514-f87e34085b2c?q=80&w=3064&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D" alt="Product Image">
      <div class="item-details">
        <h3>Stylish Sneakers</h3>
        <div class="item-price">$89.99 x 1</div>
      </div>
      <a class="remove-button" href="#">Remove</a>
    </div>

    <div class="cart-item">
      <img src="https://images.unsplash.com/photo-1579811216948-6f57c19376a5?q=80&w=1998&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D" alt="Product Image">
      <div class="item-details">
        <h3>Minimal Backpack</h3>
        <div class="item-price">$59.99 x 2</div>
      </div>
      <a class="remove-button" href="#">Remove</a>
    </div>

    <div class="total-price">Total: $209.97</div>
    <a href="#" class="checkout-button">Proceed to Checkout</a>
  </div>

</body>
</html>
